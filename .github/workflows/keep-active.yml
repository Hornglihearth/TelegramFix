name: Keep Active

on:
  schedule:
    - cron: '0 */2 * * 1-5'   # каждые 2 часа в будни (UTC)

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Make commit
        run: |
          git config user.email "270450827+Hornglihearth@users.noreply.github.com"
          git config user.name "Hornglihearth"
          echo "$(date) - Keep active" >> activity.log
          git add activity.log
          git commit -m "chore: periodic update"
          git pull --rebase origin main || true
          git push
