name: Keep Active

on:
  schedule:
    - cron: '0 */2 * * 1-5'   # каждые 2 часа в будни (UTC)
  workflow_dispatch:           # ручной запуск для проверки

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Make commit and push
        run: |
          # Настройка пользователя
          git config user.email "270450827+Hornglihearth@users.noreply.github.com"
          git config user.name "Hornglihearth"

          # Принудительно переключаем remote URL на использование PAT
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Hornglihearth/TelegramFix.git

          # Добавляем запись
          echo "$(date) - Keep active" >> activity.log
          git add activity.log

          # Коммитим только если есть изменения
          if ! git diff --cached --quiet; then
            git commit -m "chore: periodic update"
            git pull --rebase origin main --allow-unrelated-histories || true
            git push origin main
          else
            echo "Нет изменений для коммита"
          fi
