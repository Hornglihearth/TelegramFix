name: Keep Active

on:
  schedule:
    - cron: '0 */2 * * 1-5'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Make commit and push
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          # Удаляем заголовок аутентификации GitHub, который мешает
          git config --unset-all http.https://github.com/.extraheader || true

          # Настраиваем пользователя
          git config user.email "270450827+Hornglihearth@users.noreply.github.com"
          git config user.name "Hornglihearth"

          # Принудительно меняем URL удалённого репозитория
          git remote set-url origin https://x-access-token:${PAT}@github.com/Hornglihearth/TelegramFix.git

          # Добавляем запись
          echo "$(date) - Keep active" >> activity.log
          git add activity.log

          # Если нет изменений — выходим
          if git diff --cached --quiet; then
            echo "Нет изменений для коммита"
            exit 0
          fi

          # Коммитим
          git commit -m "chore: periodic update"

          # Pull с rebase (используем переопределённый origin)
          git pull --rebase origin main --allow-unrelated-histories || true

          # Push
          git push origin main
