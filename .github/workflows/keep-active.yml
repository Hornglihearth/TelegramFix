name: Keep Active

on:
  schedule:
    - cron: '0 */2 * * 1-5'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Make empty commit and push
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          git config --unset-all http.https://github.com/.extraheader || true
          git config user.name "Hornglihearth"
          git config user.email "270450827+Hornglihearth@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${PAT}@github.com/Hornglihearth/TelegramFix.git

          git fetch origin main
          git reset --hard origin/main

          git commit --allow-empty -m "chore: periodic keep-alive"

          git push origin main
