name: Keep Active

on:
  schedule:
    - cron: '0 */2 * * 1-5'   # каждые 2 часа в будни (UTC)
  workflow_dispatch:           # ручной запуск

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false   # отключаем GITHUB_TOKEN
          fetch-depth: 0

      - name: Make empty commit and push
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          # Удаляем лишние заголовки аутентификации
          git config --unset-all http.https://github.com/.extraheader || true

          # Настраиваем пользователя
          git config user.name "Hornglihearth"
          git config user.email "270450827+Hornglihearth@users.noreply.github.com"

          # Переключаем remote URL на PAT
          git remote set-url origin https://x-access-token:${PAT}@github.com/Hornglihearth/TelegramFix.git

          # Создаём пустой коммит (без изменений в файлах)
          git commit --allow-empty -m "chore: periodic keep-alive"

          # Подтягиваем изменения и пушим
          git pull --rebase origin main --allow-unrelated-histories || true
          git push origin main
